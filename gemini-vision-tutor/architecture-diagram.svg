  <rect x="675" y="150" width="180" height="35" rx="5" fill="#064e3b" stroke="#059669" stroke-width="1"/>
  <text x="765" y="164" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Gemini 1.5 Flash</text>
  <text x="765" y="178" text-anchor="middle" fill="#6ee7b7" font-size="9">Fast Dialogue + Interruptions</text>

  <rect x="675" y="192" width="180" height="25" rx="5" fill="#064e3b" stroke="#059669" stroke-width="1"/>
  <text x="765" y="208" text-anchor="middle" fill="#6ee7b7" font-size="9">Streaming API (AsyncIterator)</text>

  <rect x="675" y="224" width="180" height="25" rx="5" fill="#064e3b" stroke="#059669" stroke-width="1"/>
  <text x="765" y="240" text-anchor="middle" fill="#6ee7b7" font-size="9">google-generativeai SDK</text>

