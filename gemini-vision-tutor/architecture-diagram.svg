  <text x="95" y="539" text-anchor="middle" fill="#93c5fd" font-size="9">1. Camera Frame</text>

  <text x="155" y="539" fill="#6b7280" font-size="14">→</text>

  <rect x="168" y="520" width="100" height="30" rx="5" fill="#2d1b69" stroke="#7c3aed"/>
  <text x="218" y="539" text-anchor="middle" fill="#c4b5fd" font-size="9">2. Vision Agent</text>

  <text x="278" y="539" fill="#6b7280" font-size="14">→</text>

  <rect x="291" y="520" width="105" height="30" rx="5" fill="#064e3b" stroke="#059669"/>
  <text x="343" y="539" text-anchor="middle" fill="#6ee7b7" font-size="9">3. Gemini Analyzes</text>

  <text x="406" y="539" fill="#6b7280" font-size="14">→</text>

  <rect x="419" y="520" width="105" height="30" rx="5" fill="#2d1b69" stroke="#7c3aed"/>
  <text x="471" y="539" text-anchor="middle" fill="#c4b5fd" font-size="9">4. Teaching Plan</text>

  <text x="534" y="539" fill="#6b7280" font-size="14">→</text>

  <rect x="547" y="520" width="100" height="30" rx="5" fill="#2d1b69" stroke="#7c3aed"/>
  <text x="597" y="539" text-anchor="middle" fill="#c4b5fd" font-size="9">5. Stream Text</text>

  <text x="657" y="539" fill="#6b7280" font-size="14">→</text>

  <rect x="670" y="520" width="100" height="30" rx="5" fill="#1e3a5f" stroke="#2563eb"/>
  <text x="720" y="539" text-anchor="middle" fill="#93c5fd" font-size="9">6. Voice + UI</text>

  <text x="780" y="539" fill="#6b7280" font-size="14">↺</text>

  <!-- Bottom note -->
  <text x="450" y="585" text-anchor="middle" fill="#6b7280" font-size="10">
    Student can interrupt at any step • Dialogue Agent handles natural conversation • Diagrams generated on demand
  </text>

  <!-- ── ARROWS between sections ── -->
  <!-- User → Frontend -->
  <line x1="190" y1="165" x2="220" y2="165" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="220,161 228,165 220,169" fill="#374151"/>
  <text x="205" y="159" text-anchor="middle" fill="#6b7280" font-size="8">WS</text>

  <!-- Frontend → Backend -->
  <line x1="400" y1="165" x2="430" y2="165" stroke="#4338ca" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="430,161 438,165 430,169" fill="#4338ca"/>
  <text x="415" y="159" text-anchor="middle" fill="#6b7280" font-size="8">WS</text>

  <!-- Backend → Gemini -->
  <line x1="630" y1="165" x2="660" y2="165" stroke="#6d28d9" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="660,161 668,165 660,169" fill="#6d28d9"/>
  <text x="645" y="159" text-anchor="middle" fill="#6b7280" font-size="8">API</text>

  <!-- Backend → GCP services (vertical) -->
  <line x1="530" y1="280" x2="120" y2="360" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="530" y1="280" x2="320" y2="360" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="530" y1="280" x2="520" y2="360" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="530" y1="280" x2="750" y2="360" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
</svg>
