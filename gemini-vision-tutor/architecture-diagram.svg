  <text x="464" y="167" text-anchor="middle" fill="#c4b5fd" font-size="8">Vision</text>

  <rect x="489" y="153" width="40" height="22" rx="4" fill="#1e1b4b" stroke="#6d28d9"/>
  <text x="509" y="167" text-anchor="middle" fill="#c4b5fd" font-size="8">Reason</text>

  <rect x="535" y="153" width="40" height="22" rx="4" fill="#1e1b4b" stroke="#6d28d9"/>
  <text x="555" y="167" text-anchor="middle" fill="#c4b5fd" font-size="8">Teach</text>

  <rect x="581" y="153" width="34" height="22" rx="4" fill="#1e1b4b" stroke="#6d28d9"/>
  <text x="598" y="167" text-anchor="middle" fill="#c4b5fd" font-size="8">Dial.</text>

