  <text x="320" y="426" text-anchor="middle" fill="#9ca3af" font-size="9">Auto-expiry: 7 days</text>
  <text x="320" y="444" text-anchor="middle" fill="#6b7280" font-size="9">Google Cloud Storage</text>

  <!-- Cloud Run -->
  <rect x="430" y="360" width="180" height="100" rx="10" fill="#161b22" stroke="#0891b2" stroke-width="1.5"/>
  <text x="520" y="380" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">CLOUD RUN</text>
  <text x="520" y="398" text-anchor="middle" fill="#9ca3af" font-size="9">Backend: 2CPU / 2GiB</text>
  <text x="520" y="412" text-anchor="middle" fill="#9ca3af" font-size="9">Frontend: 1CPU / 512MiB</text>
  <text x="520" y="426" text-anchor="middle" fill="#9ca3af" font-size="9">Auto-scaling (0→10)</text>
  <text x="520" y="444" text-anchor="middle" fill="#6b7280" font-size="9">Serverless Containers</text>

