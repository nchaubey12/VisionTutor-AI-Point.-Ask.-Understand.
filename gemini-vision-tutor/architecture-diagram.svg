  <text x="530" y="192" text-anchor="middle" fill="#6b7280" font-size="9">SERVICES</text>
  <rect x="445" y="198" width="50" height="22" rx="4" fill="#1a1a2e" stroke="#4c1d95"/>
  <text x="470" y="212" text-anchor="middle" fill="#a78bfa" font-size="8">Gemini</text>

  <rect x="501" y="198" width="55" height="22" rx="4" fill="#1a1a2e" stroke="#4c1d95"/>
  <text x="528" y="212" text-anchor="middle" fill="#a78bfa" font-size="8">Firestore</text>

  <rect x="562" y="198" width="53" height="22" rx="4" fill="#1a1a2e" stroke="#4c1d95"/>
