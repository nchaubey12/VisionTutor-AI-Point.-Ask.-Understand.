  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Gemini Vision Tutor — Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#8b949e" font-size="11">Real-Time Multimodal AI Tutoring System</text>

  <!-- ── USER SECTION ── -->
  <rect x="30" y="80" width="160" height="200" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="110" y="100" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="600">USER DEVICE</text>

  <!-- Camera icon -->
  <rect x="70" y="110" width="80" height="52" rx="6" fill="#1f2937" stroke="#374151"/>
  <rect x="82" y="118" width="42" height="30" rx="3" fill="#374151"/>
  <circle cx="103" cy="133" r="10" fill="#1a2744" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="103" cy="133" r="5" fill="#3b82f6"/>
  <polygon points="124,120 134,126 124,132" fill="#374151"/>
  <text x="110" y="177" text-anchor="middle" fill="#9ca3af" font-size="9">WebCam</text>

  <!-- Mic icon -->
  <rect x="70" y="190" width="35" height="36" rx="6" fill="#1f2937" stroke="#374151"/>
  <rect x="80" y="198" width="15" height="18" rx="7" fill="#10b981"/>
  <path d="M77 212 Q77 222 87 222 Q97 222 97 212" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <line x1="87" y1="222" x2="87" y2="228" stroke="#10b981" stroke-width="1.5"/>
  <text x="83" y="233" text-anchor="middle" fill="#9ca3af" font-size="9">Voice</text>

