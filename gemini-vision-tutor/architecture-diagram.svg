  <rect x="220" y="80" width="180" height="200" rx="10" fill="#161b22" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="310" y="100" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">FRONTEND</text>

  <rect x="235" y="110" width="150" height="30" rx="5" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="310" y="129" text-anchor="middle" fill="#93c5fd" font-size="10">WebSocket Client</text>

  <rect x="235" y="150" width="150" height="25" rx="5" fill="#1e3a5f" stroke="#1d4ed8" stroke-width="1"/>
  <text x="310" y="166" text-anchor="middle" fill="#93c5fd" font-size="10">useWebcam Hook</text>

  <rect x="235" y="183" width="150" height="25" rx="5" fill="#1e3a5f" stroke="#1d4ed8" stroke-width="1"/>
  <text x="310" y="199" text-anchor="middle" fill="#93c5fd" font-size="10">useSpeech Hook</text>

  <rect x="235" y="216" width="150" height="25" rx="5" fill="#1e3a5f" stroke="#1d4ed8" stroke-width="1"/>
  <text x="310" y="232" text-anchor="middle" fill="#93c5fd" font-size="10">TutorPage UI</text>

