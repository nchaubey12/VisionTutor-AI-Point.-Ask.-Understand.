  <rect x="630" y="360" width="240" height="100" rx="10" fill="#161b22" stroke="#dc2626" stroke-width="1.5"/>
  <text x="750" y="380" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">SECRET MANAGER</text>
  <text x="750" y="398" text-anchor="middle" fill="#9ca3af" font-size="9">GEMINI_API_KEY</text>
  <text x="750" y="412" text-anchor="middle" fill="#9ca3af" font-size="9">Service Account Credentials</text>
  <text x="750" y="426" text-anchor="middle" fill="#9ca3af" font-size="9">IAM-protected access</text>
  <text x="750" y="444" text-anchor="middle" fill="#6b7280" font-size="9">Google Secret Manager</text>

