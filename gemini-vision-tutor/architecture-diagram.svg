  <!-- Firestore -->
  <rect x="30" y="360" width="180" height="100" rx="10" fill="#161b22" stroke="#ea580c" stroke-width="1.5"/>
  <text x="120" y="380" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">FIRESTORE</text>
  <text x="120" y="398" text-anchor="middle" fill="#9ca3af" font-size="9">Conversation Sessions</text>
  <text x="120" y="412" text-anchor="middle" fill="#9ca3af" font-size="9">Problem History</text>
  <text x="120" y="426" text-anchor="middle" fill="#9ca3af" font-size="9">Teaching Plans</text>
  <text x="120" y="444" text-anchor="middle" fill="#6b7280" font-size="9">NoSQL Document DB</text>

  <!-- Cloud Storage -->
